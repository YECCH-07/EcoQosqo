<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <rect width="900" height="750" fill="#fafafa"/>

  <!-- Título -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="800" fill="#4a001f">Base de Datos — EcoQosqo</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#888">MySQL · BD: software · 5 tablas · 4 relaciones</text>

  <!-- ============================================ -->
  <!-- roles -->
  <!-- ============================================ -->
  <rect x="330" y="80" width="240" height="110" rx="8" fill="#fff" stroke="#7a1636" stroke-width="2"/>
  <text x="450" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#7a1636">roles</text>
  <line x1="340" y1="112" x2="560" y2="112" stroke="#eee"/>
  <text x="345" y="130" font-size="11" fill="#333">🔑 id</text><text x="560" y="130" text-anchor="end" font-size="9" fill="#999">PK</text>
  <text x="345" y="148" font-size="11" fill="#333">nombre</text><text x="560" y="148" text-anchor="end" font-size="9" fill="#999">UNIQUE</text>
  <line x1="340" y1="156" x2="560" y2="156" stroke="#eee"/>
  <text x="345" y="172" font-size="9" fill="#888">ADMIN, ADMINISTRADOR, CIUDADANO, EMPRESAS,</text>
  <text x="345" y="186" font-size="9" fill="#888">MAQUINARIAS, OPERADOR, OP. NOTIFICACIONES, RECURSOS</text>

  <!-- ============================================ -->
  <!-- usuarios -->
  <!-- ============================================ -->
  <rect x="50" y="260" width="260" height="180" rx="8" fill="#fff" stroke="#4a001f" stroke-width="2"/>
  <text x="180" y="283" text-anchor="middle" font-size="14" font-weight="700" fill="#4a001f">usuarios</text>
  <line x1="60" y1="292" x2="300" y2="292" stroke="#eee"/>
  <text x="70" y="310" font-size="11" fill="#333">🔑 id</text><text x="300" y="310" text-anchor="end" font-size="9" fill="#999">PK</text>
  <text x="70" y="328" font-size="11" fill="#333">nombre</text><text x="300" y="328" text-anchor="end" font-size="9" fill="#999">VARCHAR 120</text>
  <text x="70" y="346" font-size="11" fill="#333">usuario</text><text x="300" y="346" text-anchor="end" font-size="9" fill="#999">VARCHAR 80 UNIQUE</text>
  <text x="70" y="364" font-size="11" fill="#333">correo</text><text x="300" y="364" text-anchor="end" font-size="9" fill="#999">VARCHAR 160 UNIQUE</text>
  <text x="70" y="382" font-size="11" fill="#333">password_hash</text><text x="300" y="382" text-anchor="end" font-size="9" fill="#999">VARCHAR 255 bcrypt</text>
  <text x="70" y="400" font-size="11" fill="#333">activo</text><text x="300" y="400" text-anchor="end" font-size="9" fill="#999">TINYINT</text>
  <text x="70" y="418" font-size="11" fill="#2563eb"># rol_id</text><text x="300" y="418" text-anchor="end" font-size="9" fill="#2563eb">FK → roles</text>
  <line x1="60" y1="426" x2="300" y2="426" stroke="#eee"/>
  <text x="70" y="440" font-size="9" fill="#888">admin, administrador, recursos</text>
  <text x="70" y="456" font-size="9" fill="#888">cliente, empresa (5 registros)</text>

  <!-- ============================================ -->
  <!-- tipos_personal -->
  <!-- ============================================ -->
  <rect x="590" y="260" width="260" height="140" rx="8" fill="#fff" stroke="#aaa" stroke-width="1.5"/>
  <text x="720" y="283" text-anchor="middle" font-size="14" font-weight="700" fill="#888">tipos_personal</text>
  <line x1="600" y1="292" x2="840" y2="292" stroke="#eee"/>
  <text x="610" y="310" font-size="11" fill="#333">🔑 id</text><text x="840" y="310" text-anchor="end" font-size="9" fill="#999">PK</text>
  <text x="610" y="328" font-size="11" fill="#333">nombre</text><text x="840" y="328" text-anchor="end" font-size="9" fill="#999">VARCHAR 80 UNIQUE</text>
  <line x1="600" y1="336" x2="840" y2="336" stroke="#eee"/>
  <text x="610" y="352" font-size="9" fill="#888">Conductor, Ayudante, Limpieza, Recolector,</text>
  <text x="610" y="368" font-size="9" fill="#888">Administrativo, Operario, Otro, Supervisor</text>
  <text x="610" y="384" font-size="9" fill="#888">(8 registros, editable desde panel)</text>

  <!-- ============================================ -->
  <!-- personal -->
  <!-- ============================================ -->
  <rect x="200" y="510" width="500" height="190" rx="8" fill="#fff" stroke="#e6a817" stroke-width="2"/>
  <text x="450" y="533" text-anchor="middle" font-size="14" font-weight="700" fill="#b8860b">personal · servidores públicos</text>
  <line x1="210" y1="542" x2="690" y2="542" stroke="#eee"/>

  <text x="220" y="560" font-size="11" fill="#333">🔑 id · nombres · apellidos · dni · telefono · direccion</text>
  <text x="220" y="580" font-size="11" fill="#333"># tipo_id</text><text x="335" y="580" font-size="9" fill="#2563eb">FK → tipos_personal</text>
  <text x="440" y="580" font-size="11" fill="#333"># unidad_organica_id</text><text x="595" y="580" font-size="9" fill="#2563eb">FK → unidades_organicas</text>
  <text x="220" y="600" font-size="11" fill="#333">fecha_contratacion · fecha_fin_contrato · honorarios · estado</text>
  <line x1="210" y1="608" x2="690" y2="608" stroke="#eee" stroke-width="0.5"/>
  <text x="220" y="624" font-size="10" fill="#7a1636">🇵🇪 Campos Servidor Público:</text>
  <text x="220" y="642" font-size="11" fill="#555">regimen_laboral (CAS, D.L.728, D.L.276, SERVIR)</text>
  <text x="220" y="660" font-size="11" fill="#555">condicion (Nombrado, Contratado CAS, Locador...)</text>
  <text x="220" y="678" font-size="11" fill="#555">nivel (Funcionario, Directivo, Profesional, Técnico, Auxiliar)</text>
  <text x="220" y="696" font-size="11" fill="#555">nro_resolucion · correo_institucional</text>

  <!-- ============================================ -->
  <!-- unidades_organicas -->
  <!-- ============================================ -->
  <rect x="50" y="510" width="120" height="90" rx="8" fill="#fff" stroke="#0F6B4F" stroke-width="2"/>
  <text x="110" y="535" text-anchor="middle" font-size="11" font-weight="700" fill="#0F6B4F">unidades</text>
  <text x="110" y="553" text-anchor="middle" font-size="11" font-weight="700" fill="#0F6B4F">organicas</text>
  <line x1="60" y1="560" x2="160" y2="560" stroke="#eee"/>
  <text x="65" y="578" font-size="10" fill="#333">🔑 id · nombre</text>
  <text x="65" y="596" font-size="10" fill="#333">sigla · nivel</text>
  <text x="65" y="614" font-size="10" fill="#2563eb"># padre_id</text>
  <text x="65" y="630" font-size="8" fill="#999">FK → sí misma</text>

  <!-- Árbol visual dentro de la tabla -->
  <text x="65" y="650" font-size="8" fill="#0F6B4F">CM · ALC → GM</text>
  <text x="65" y="664" font-size="8" fill="#0F6B4F">→ GGA/GINFRA/OGRH</text>
  <text x="65" y="678" font-size="8" fill="#0F6B4F">→ SGRSS/SGCA</text>
  <text x="65" y="694" font-size="8" fill="#999">(8 registros)</text>

  <!-- ============================================ -->
  <!-- FLECHAS / RELACIONES -->
  <!-- ============================================ -->

  <!-- usuarios → roles -->
  <line x1="360" y1="260" x2="420" y2="192" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="365" y="225" font-size="9" fill="#555">rol_id</text>

  <!-- personal → tipos_personal -->
  <line x1="700" y1="510" x2="700" y2="400" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="708" y="455" font-size="9" fill="#555">tipo_id</text>

  <!-- personal → unidades_organicas -->
  <line x1="200" y1="570" x2="172" y2="570" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="100" y="562" font-size="9" fill="#555">unidad_org.</text>

  <!-- auto-ref unidades -->
  <path d="M110,510 C110,490 110,480 130,480 C160,480 160,490 160,510" stroke="#555" stroke-width="1" fill="none" marker-end="url(#a)" stroke-dasharray="5"/>
  <text x="65" y="578" font-size="7" fill="#999">padre_id (self)</text>

  <!-- ============================================ -->
  <!-- REGISTROS -->
  <!-- ============================================ -->
  <rect x="730" y="510" width="150" height="90" rx="8" fill="#f9f7f8" stroke="#eee" stroke-width="1"/>
  <text x="805" y="535" text-anchor="middle" font-size="11" font-weight="700" fill="#4a001f">Registros</text>
  <line x1="740" y1="545" x2="870" y2="545" stroke="#eee"/>
  <text x="745" y="562" font-size="10" fill="#555">roles: 8</text>
  <text x="745" y="578" font-size="10" fill="#555">usuarios: 5</text>
  <text x="745" y="594" font-size="10" fill="#555">tipos_personal: 8</text>
  <text x="745" y="610" font-size="10" fill="#555">personal: 6</text>
  <text x="745" y="626" font-size="10" fill="#555">unidades: 8</text>

  <!-- ============================================ -->
  <!-- QUERIES PRINCIPALES -->
  <!-- ============================================ -->
  <rect x="50" y="720" width="800" height="20" rx="4" fill="#f3e8ec"/>
  <text x="450" y="735" text-anchor="middle" font-size="10" fill="#7a1636">Login: SELECT u.*, r.nombre FROM usuarios u JOIN roles r ON u.rol_id = r.id WHERE u.usuario = ?</text>
</svg>
